name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: >
          dotnet test PenPressureProfiler.Tests/PenPressureProfiler.Tests.csproj
          --configuration Release
          --nologo
          --verbosity minimal

      - name: Publish win-x64 (self-contained)
        run: >
          dotnet publish PenPressureProfiler/PenPressureProfiler.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/win-x64
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Zip win-x64 artifact
        run: >
          Compress-Archive
          -Path publish/win-x64/*
          -DestinationPath PenPressureProfiler-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PenPressureProfiler-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
